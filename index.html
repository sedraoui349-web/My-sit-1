<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمان نت - دليلك للوقاية من النصب الإلكتروني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #e53e3e;
            --bg-color: #f7fafc;
            --text-color: #2d3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* رأس الصفحة (Header) */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-weight: 900;
            font-size: 1.8rem;
        }

        /* القسم الترحيبي (Hero Section) */
        .hero {
            text-align: center;
            padding: 4rem 5%;
            background: linear-gradient(rgba(26, 54, 93, 0.8), rgba(43, 108, 176, 0.8)), url('https://images.unsplash.com/photo-1563986768494-4dee2763ff3f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') center/cover;
            color: white;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* قسم المشاكل والحلول */
        .scams-section {
            padding: 4rem 5%;
            text-align: center;
        }

        .scams-section h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .btn-solution {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
            font-weight: 700;
        }

        .btn-solution:hover {
            background-color: var(--primary-color);
        }

        /* نافذة الحل (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            position: relative;
            text-align: right;
            border-top: 5px solid var(--accent-color);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0aec0;
        }

        .close-btn:hover {
            color: var(--text-color);
        }

        /* قسم البحث */
        .search-section {
            background-color: #edf2f7;
            padding: 4rem 5%;
            text-align: center;
        }

        .search-section h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .search-box {
            display: flex;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-box input {
            width: 70%;
            padding: 1rem;
            border: 1px solid #cbd5e0;
            border-radius: 0 5px 5px 0;
            font-size: 1rem;
            outline: none;
        }

        .search-box button {
            width: 30%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 5px 0 0 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background-color: #c53030;
        }

        /* الفوتر */
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
        }
